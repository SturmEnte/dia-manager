<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dia Manager</title>
		<link rel="stylesheet" href="/main.css" />
		<script src="/main.js" defer></script>
	</head>
	<body>
		<div class="title">Dia Manager</div>
		<div id="catheter" class="section">
			<div class="title">Katheter</div>
			<button class="new">Neu</button>
			<div class="current">Aktueller</div>
			<div class="history"></div>
		</div>

		<!-- This template is only used as an aid while programming and not really used because it was to complicated to use -->
		<template id="entry-template">
			<div data-id="name">Name:</div>
			<div data-id="ref">REF:</div>
			<div data-id="lot">LOT:</div>
			<div data-id="produced-date">Herstellungsdatum:</div>
			<div data-id="expiration-date">Ablaufdatum:</div>
			<div data-id="usage-start">Nutzungsstart:</div>
			<div data-id="usage-end">Nutzungsende:</div>
		</template>
	</body>
</html>
