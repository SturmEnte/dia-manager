<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dia Manager</title>
		<link rel="preload" href="/fonts/NotoColorEmoji-Regular.ttf" as="font" type="font/ttf" />
		<link rel="stylesheet" href="/main/main.css" />
		<link rel="stylesheet" href="/css/global.css" />
		<link rel="stylesheet" href="/css/languageSelector.css" />
		<script src="/js/getCookieValue.js"></script>
		<script src="/js/dictionaryManager.js"></script>
		<script src="/js/languageSelector.js" defer></script>
		<script src="/main/main.js" defer></script>
	</head>
	<body>
		<div id="header">
			<div id="main-title">Dia Manager</div>
			<div id="menu">
				<select id="device">
					<option value="catheters">Catheters</option>
					<option value="sensors">Sensors</option>
				</select>
				<select id="language-selector"></select>
				<a href="/logout"> L</a>
			</div>
		</div>

		<div id="devices">
			<div id="catheters" class="device">Catheters</div>
			<div id="sensors" class="device">Sensors</div>
		</div>

		<!-- This template is only used as an aid while programming and not really used because it was to complicated to use -->
		<template id="entry-template">
			<div data-id="name">Name:</div>
			<div data-id="ref">REF:</div>
			<div data-id="lot">LOT:</div>
			<div data-id="date-of-manufacture">Date of Manufacture:</div>
			<div data-id="expiry-date">Expiry Date:</div>
			<div data-id="start-of-use">Start of use:</div>
			<div data-id="end-of-use">End of use:</div>
		</template>
	</body>
</html>
